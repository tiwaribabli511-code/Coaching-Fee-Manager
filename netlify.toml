[build]
  command   = "pnpm --filter @workspace/fee-tracker run build"
  publish   = "artifacts/fee-tracker/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# SPA fallback — serve index.html for every route so wouter can handle routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
